<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Buku Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <h1>Toko Buku Online 📚</h1>
</header>

<!-- NAV -->
<nav>
    <ul>
        <li><a href="#">Beranda</a></li>
        <li><a href="#produk">Produk</a></li>
        <li><a href="#form">Beli Buku</a></li>
    </ul>
</nav>

<!-- MAIN -->
<main>

    <!-- SECTION PRODUK -->
    <section id="produk">
        <h2>Daftar Buku</h2>
        <div id="produk-container" class="produk-container"></div>
    </section>

    <!-- TAMBAH PRODUK -->
    <section>
        <h2>Tambah Buku</h2>
        <input type="text" id="judulBaru" placeholder="Judul Buku">
        <input type="number" id="hargaBaru" placeholder="Harga">
        <button onclick="tambahBuku()">Tambah</button>
    </section>

    <!-- FORM PEMBELIAN -->
    <section id="form">
        <h2>Form Pembelian</h2>
        <form id="formBeli">

            <label>Nama</label>
            <input type="text" id="nama">
            <small class="error" id="errNama"></small>

            <label>Email</label>
            <input type="email" id="email">
            <small class="error" id="errEmail"></small>

            <label>Nomor HP</label>
            <input type="number" id="hp">
            <small class="error" id="errHp"></small>

            <label>Pilih Buku</label>
            <select id="pilihBuku">
                <option value="">-- Pilih --</option>
                <option>MATEMATIKA</option>
                <option>BIOLOGI</option>
                <option>STATISTIKA</option>
                <option>BAHASA INDONESIA</option>
            </select>
            <small class="error" id="errBuku"></small>

            <label>Metode Pembayaran</label>
    <div class="radio-group">

             <div class="radio-item">
             <input type="radio" name="bayar" value="Transfer">
             <label>Transfer</label>
             </div>

             <div class="radio-item">
             <input type="radio" name="bayar" value="COD">
            <label>COD</label>
    </div>

</div>
            <small class="error" id="errBayar"></small>

            <button type="submit">Beli Sekarang</button>
        </form>
    </section>

</main>

<!-- FOOTER -->
<footer>
    <p>&copy; 2026 Toko Buku Online</p>
</footer>

<script src="script.js"></script>

</body>
</html>
